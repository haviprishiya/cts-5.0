<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local Community Event Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Local Community Event Portal</h1>

  <section>
    <h2>Search and Filter Events</h2>

    <input type="text" id="searchBox" placeholder="Search event by name">

    <select id="categoryFilter">
      <option value="All">All Categories</option>
      <option value="Music">Music</option>
      <option value="Workshop">Workshop</option>
      <option value="Sports">Sports</option>
      <option value="Food">Food</option>
    </select>
  </section>

  <section>
    <h2>Upcoming Events</h2>
    <div id="loading">Loading events...</div>
    <div id="eventContainer"></div>
  </section>

  <section>
    <h2>Register for Event</h2>

    <form id="registrationForm">
      <input type="text" name="username" placeholder="Enter your name">
      <span class="error" id="nameError"></span>

      <input type="email" name="email" placeholder="Enter your email">
      <span class="error" id="emailError"></span>

      <select name="eventName" id="eventSelect">
        <option value="">Select Event</option>
      </select>
      <span class="error" id="eventError"></span>

      <button type="submit" id="registerBtn">Submit Registration</button>
    </form>

    <p id="formMessage"></p>
  </section>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="main.js"></script>

</body>
</html>
